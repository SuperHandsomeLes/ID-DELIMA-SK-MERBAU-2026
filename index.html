<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIMa DASHBOARD BY LESKAY DESIGN STUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #feca57 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 30px; padding: 40px 30px;
            width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center;
        }
        .logo-img {
            width: 110px; height: 110px; border-radius: 50%;
            margin: 0 auto 20px; border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            object-fit: cover;
        }
        h2 { color: #2d3436; font-weight: 800; font-size: 1.8rem; margin: 0; }
        .subtitle { 
            color: #2d3436; font-size: 0.85rem; margin-bottom: 30px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        input {
            width: 100%; padding: 18px 25px; border-radius: 50px; border: none;
            background: white; font-size: 1rem; margin-bottom: 15px; outline: none; text-align: center;
        }
        .btn-search {
            width: 100%; padding: 18px; border-radius: 50px; border: none; background: #6c5ce7;
            color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-search:hover { transform: translateY(-2px); background: #5b4bc4; }
        #result { margin-top: 30px; text-align: left; }
        .card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); animation: slideUp 0.4s ease;
        }
        .card .name { font-weight: 800; color: #2d3436; font-size: 1.1rem; display: block; }
        .id-container {
            background: #f1f2f6; padding: 10px 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
        }
        .id-text { color: #d63031; font-family: monospace; font-weight: 700; font-size: 0.85rem; word-break: break-all; }
        .copy-btn { background: #6c5ce7; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: 700; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <img src="1.jpg" alt="Invictus Logo" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=Invictus&background=6c5ce7&color=fff'">
    
    <h2>SK MERBAU</h2>
    <p class="subtitle">DELIMa DASHBOARD BY LESKAY DESIGN STUDIO</p>
    
    <input type="text" id="namaInput" placeholder="Taip nama murid...">
    <button class="btn-search" onclick="cariSekarang()">CARI SEKARANG</button>

    <div id="result"></div>
</div>

<script>
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQIDL_97U8seCG9Ibuz-tfkjpouZe3V_q2Uh-NbvdhEIctFj35L6-LN55TuRw_3IQ/pub?output=csv";
    let database = [];

    async function muatData() {
        try {
            const r = await fetch(csvURL);
            const t = await r.text();
            database = t.split('\n').map(line => line.split(',').map(cell => cell.replace(/"/g, '').trim()));
        } catch (e) { console.error("Ralat!"); }
    }

    function cariSekarang() {
        const query = document.getElementById('namaInput').value.trim().toUpperCase();
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = '';

        if (query.length < 3) {
            resDiv.innerHTML = '<p style="text-align:center; color:#d63031;">Sila taip sekurang-kurangnya 3 huruf.</p>';
            return;
        }

        const hasil = database.filter(row => row.some(cell => cell.toUpperCase().includes(query)));

        if (hasil.length > 0) {
            hasil.forEach(row => {
                const idDelima = row.find(c => c.includes('@')) || 'TIADA ID';
                const nama = row[1] || row[0]; 
                const kelas = row[3] || row[2] || '-';

                resDiv.innerHTML += `
                    <div class="card">
                        <span class="name">${nama}</span>
                        <small style="color:#636e72">KELAS: ${kelas}</small>
                        <div class="id-container">
                            <span class="id-text">${idDelima}</span>
                            <button class="copy-btn" onclick="salin('${idDelima}')">SALIN</button>
                        </div>
                    </div>
                `;
            });
        } else {
            resDiv.innerHTML = '<p style="text-align:center; color:#d63031;">Nama tidak dijumpai.</p>';
        }
    }

    function salin(t) {
        if(t === 'TIADA ID') return;
        navigator.clipboard.writeText(t);
        alert("ID disalin!");
    }

    window.onload = muatData;
</script>

</body>
</html>
